apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "psh.frontend.fullname" . }}-nginx
  labels:
    {{- include "psh.frontend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        client_max_body_size 4m;

        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   font/woff2 image/svg+xml;

        # SPA only — /api, /git, /marketplace.json, /healthz are handled by
        # the ingress and routed directly to the backend service.

        # Hashed build artifacts — safe to cache forever
        location /assets/ {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # SPA entry — must always revalidate so deploys take effect
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
