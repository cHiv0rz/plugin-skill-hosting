# Security response headers (S7 hardening). This snippet is included at the
# server level (covering the SPA document served via `location /`) AND inside
# the static-file blocks that declare their own add_header — nginx replaces,
# rather than merges, inherited add_header directives, so a block with any
# add_header of its own would otherwise drop these.
#
# CSP: scripts are locked to same-origin. The Vite build emits only external,
# hashed module scripts (no inline JS), so 'self' suffices and inline-script
# injection is blocked outright. Inline *styles* are allowed because the
# Crepe/ProseMirror editor injects them at runtime (and the backend's OAuth
# login form uses an inline <style>); style injection is far lower risk than
# script injection. frame-ancestors 'none' blocks clickjacking.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# HSTS only when the edge served the request over HTTPS (the prod Ingress sets
# X-Forwarded-Proto: https). On plain-HTTP local dev the mapped value is empty
# and nginx omits the header, so localhost is never pinned to HTTPS.
add_header Strict-Transport-Security $hsts_header always;
